
<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TIẾNG TRUNG MINH TÚ 明秀汉语</title>
<script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=Inter:wght@300;400;500;600&family=Noto+Sans+SC:wght@300;400;500&display=swap');

  :root {
    --ink: #1a1a2e;
    --ink-soft: #2d2d44;
    --paper: #f7f4ef;
    --paper-warm: #ede9e1;
    --paper-card: #faf8f5;
    --red: #c0392b;
    --red-light: #e74c3c;
    --gold: #b8860b;
    --gold-light: #d4a017;
    --green: #27ae60;
    --blue: #2980b9;
    --shadow: rgba(26,26,46,0.12);
    --radius: 16px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', 'Noto Sans SC', sans-serif;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
  }

  /* ── HEADER ── */
  header {
    background: var(--ink);
    color: var(--paper);
    padding: 0 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 20px rgba(0,0,0,0.35);
  }
  .logo { display: flex; align-items: baseline; gap: 10px; }
  .logo-hanzi { font-family: 'Noto Serif SC', serif; font-size: 1.6rem; color: var(--gold-light); letter-spacing: 2px; }
  .logo-vn { font-size: 0.75rem; color: rgba(247,244,239,0.45); letter-spacing: 3px; text-transform: uppercase; }
  .hsk-badge {
    background: var(--red);
    color: white;
    font-size: 0.75rem;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 20px;
    letter-spacing: 1px;
  }
  .header-right { display: flex; align-items: center; gap: 12px; }
  .word-count { font-size: 0.8rem; color: rgba(247,244,239,0.55); }

  /* ── TABS ── */
  .tabs {
    display: flex;
    background: var(--paper-warm);
    border-bottom: 1px solid rgba(0,0,0,0.08);
    padding: 0 2rem;
    gap: 4px;
    overflow-x: auto;
  }
  .tab {
    padding: 14px 18px;
    border: none;
    background: none;
    cursor: pointer;
    font-size: 0.88rem;
    font-weight: 500;
    color: rgba(26,26,46,0.5);
    border-bottom: 3px solid transparent;
    margin-bottom: -1px;
    transition: all 0.2s;
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .tab:hover { color: var(--ink); }
  .tab.active { color: var(--red); border-bottom-color: var(--red); }

  /* ── MAIN ── */
  main { max-width: 900px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }
  .section { display: none; }
  .section.active { display: block; }

  /* ── WORD LIST ── */
  .list-toolbar {
    display: flex;
    gap: 10px;
    margin-bottom: 1.2rem;
    flex-wrap: wrap;
    align-items: center;
  }
  .search-box {
    flex: 1; min-width: 200px;
    padding: 10px 14px;
    border: 1.5px solid var(--paper-warm);
    border-radius: 10px;
    font-size: 0.9rem;
    background: var(--paper-card);
    outline: none;
    transition: border 0.2s;
  }
  .search-box:focus { border-color: var(--red); }
  .filter-btns { display: flex; gap: 6px; flex-wrap: wrap; }
  .flt-btn {
    padding: 7px 14px;
    border-radius: 20px;
    border: 1.5px solid var(--paper-warm);
    background: var(--paper-card);
    font-size: 0.78rem;
    cursor: pointer;
    transition: all 0.18s;
    color: var(--ink);
    font-weight: 500;
  }
  .flt-btn.active { background: var(--ink); color: var(--paper); border-color: var(--ink); }

  .word-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(185px, 1fr));
    gap: 12px;
  }
  .word-card {
    background: var(--paper-card);
    border-radius: var(--radius);
    padding: 1.1rem 1.2rem;
    cursor: pointer;
    border: 1.5px solid transparent;
    transition: all 0.2s;
    box-shadow: 0 2px 8px var(--shadow);
    position: relative;
  }
  .word-card:hover {
    border-color: var(--gold);
    transform: translateY(-2px);
    box-shadow: 0 6px 20px var(--shadow);
  }
  .wc-hanzi { font-family: 'Noto Serif SC', serif; font-size: 2.1rem; color: var(--ink); line-height: 1; margin-bottom: 4px; }
  .wc-pinyin { font-size: 0.76rem; color: var(--red); margin-bottom: 4px; letter-spacing: 0.3px; }
  .wc-nghia { font-size: 0.82rem; color: rgba(26,26,46,0.6); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .wc-type { position: absolute; top: 8px; right: 10px; font-size: 0.62rem; color: rgba(26,26,46,0.3); font-weight: 500; }

  /* ── FLASHCARD ── */
  .fc-container { display: flex; flex-direction: column; align-items: center; gap: 1.5rem; }
  .fc-progress { display: flex; align-items: center; gap: 12px; font-size: 0.85rem; color: rgba(26,26,46,0.5); width: 100%; }
  .fc-progress-bar { flex: 1; height: 6px; background: var(--paper-warm); border-radius: 3px; overflow: hidden; }
  .fc-progress-fill { height: 100%; background: linear-gradient(90deg, var(--red), var(--gold)); border-radius: 3px; transition: width 0.4s ease; }

  .flip-card { width: 100%; max-width: 520px; height: 360px; perspective: 1200px; cursor: pointer; }
  .flip-inner { position: relative; width: 100%; height: 100%; transform-style: preserve-3d; transition: transform 0.55s cubic-bezier(0.4, 0.2, 0.2, 1); }
  .flip-card.flipped .flip-inner { transform: rotateY(180deg); }
  .flip-front, .flip-back {
    position: absolute; inset: 0; backface-visibility: hidden;
    border-radius: 24px; display: flex; flex-direction: column;
    align-items: center; justify-content: center; padding: 2rem;
    box-shadow: 0 8px 40px var(--shadow);
  }
  .flip-front { background: var(--ink); color: var(--paper); }
  .flip-back { background: var(--paper-card); transform: rotateY(180deg); }

  .fc-hanzi { font-family: 'Noto Serif SC', serif; font-size: 5.5rem; line-height: 1; color: var(--gold-light); text-shadow: 0 0 40px rgba(184,134,11,0.3); margin-bottom: 8px; }
  .fc-hint { font-size: 0.78rem; opacity: 0.35; margin-top: 10px; }
  .fc-pinyin { font-size: 1.4rem; color: var(--red); margin-bottom: 8px; }
  .fc-nghia { font-size: 1.1rem; color: var(--ink); font-weight: 500; text-align: center; margin-bottom: 10px; }
  .fc-example { font-size: 0.82rem; color: rgba(26,26,46,0.55); text-align: center; border-top: 1px solid var(--paper-warm); padding-top: 10px; line-height: 1.7; }

  .fc-controls { display: flex; gap: 12px; align-items: center; }
  .btn { padding: 10px 24px; border-radius: 10px; border: none; cursor: pointer; font-size: 0.9rem; font-weight: 500; transition: all 0.18s; }
  .btn-outline { background: transparent; border: 1.5px solid var(--paper-warm); color: var(--ink); }
  .btn-outline:hover { border-color: var(--ink); }
  .btn-red { background: var(--red); color: white; }
  .btn-red:hover { background: var(--red-light); }
  .btn-green { background: var(--green); color: white; }
  .btn-green:hover { filter: brightness(1.1); }
  .btn-gold { background: var(--gold); color: white; }
  .btn-gold:hover { background: var(--gold-light); }
  .btn-sm { padding: 7px 16px; font-size: 0.82rem; }
  .btn-icon { width: 44px; height: 44px; border-radius: 50%; border: 1.5px solid var(--paper-warm); background: var(--paper-card); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; transition: all 0.18s; color: var(--ink); }
  .btn-icon:hover { border-color: var(--red); color: var(--red); }
  .fc-audio-btn { position: absolute; top: 14px; right: 14px; background: rgba(247,244,239,0.12); border: none; color: var(--paper); width: 36px; height: 36px; border-radius: 50%; cursor: pointer; font-size: 1rem; display: flex; align-items: center; justify-content: center; transition: background 0.2s; }
  .fc-audio-btn:hover { background: rgba(247,244,239,0.25); }
  .fc-pinyin-show { position: absolute; top: 14px; left: 14px; background: rgba(247,244,239,0.1); border: 1px solid rgba(247,244,239,0.2); color: rgba(247,244,239,0.7); font-size: 0.7rem; padding: 3px 8px; border-radius: 10px; cursor: pointer; }
  .fc-front-pinyin { font-size: 1rem; color: rgba(247,244,239,0.6); margin-bottom: 6px; }

  /* ── QUIZ ── */
  .quiz-header { display: flex; align-items: center; gap: 12px; margin-bottom: 1.2rem; flex-wrap: wrap; }
  .quiz-score-badge { background: var(--ink); color: var(--gold-light); padding: 6px 14px; border-radius: 20px; font-size: 0.85rem; font-weight: 600; margin-left: auto; }
  .quiz-type-bar { display: flex; gap: 8px; flex-wrap: wrap; }
  .qtype-btn { padding: 7px 14px; border-radius: 20px; border: 1.5px solid var(--paper-warm); background: var(--paper-card); font-size: 0.8rem; cursor: pointer; transition: all 0.18s; color: var(--ink); font-weight: 500; }
  .qtype-btn.active { background: var(--ink); color: var(--paper); border-color: var(--ink); }

  .quiz-question { background: var(--paper-card); border-radius: 20px; padding: 2rem; text-align: center; margin-bottom: 1.4rem; box-shadow: 0 4px 20px var(--shadow); }
  .quiz-q-hanzi { font-family: 'Noto Serif SC', serif; font-size: 4rem; color: var(--ink); margin-bottom: 4px; line-height: 1.1; }
  .quiz-q-sub { font-size: 0.85rem; color: var(--red); margin-top: 4px; }
  .quiz-q-label { font-size: 0.78rem; color: rgba(26,26,46,0.4); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px; }
  .quiz-options { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 1.2rem; }
  .quiz-opt { background: var(--paper-card); border: 2px solid var(--paper-warm); border-radius: 12px; padding: 1rem 0.8rem; cursor: pointer; font-size: 0.92rem; transition: all 0.18s; text-align: center; line-height: 1.5; }
  .quiz-opt:hover:not(:disabled) { border-color: var(--gold); transform: translateY(-1px); }
  .quiz-opt.correct { background: #e8f8ee; border-color: var(--green); color: var(--green); font-weight: 600; }
  .quiz-opt.wrong { background: #fdecea; border-color: var(--red); color: var(--red); }
  .quiz-opt:disabled { cursor: default; }
  .quiz-feedback { text-align: center; font-size: 0.95rem; font-weight: 500; min-height: 28px; margin-bottom: 0.8rem; }
  .quiz-result { text-align: center; padding: 3rem 2rem; background: var(--paper-card); border-radius: 24px; box-shadow: 0 4px 20px var(--shadow); }
  .quiz-result-score { font-family: 'Noto Serif SC', serif; font-size: 4.5rem; color: var(--gold); font-weight: 700; }
  .quiz-result-label { font-size: 1rem; color: rgba(26,26,46,0.5); margin: 0.3rem 0 1.5rem; }
  .quiz-result-detail { font-size: 0.85rem; color: rgba(26,26,46,0.4); }

  /* ── STROKE ORDER ── */
  .stroke-container { display: flex; flex-direction: column; align-items: center; gap: 1.5rem; }
  .stroke-input-row { display: flex; gap: 10px; width: 100%; max-width: 500px; }
  .stroke-input { flex: 1; padding: 12px 16px; border: 2px solid var(--paper-warm); border-radius: 12px; font-size: 1.6rem; font-family: 'Noto Serif SC', serif; text-align: center; outline: none; background: var(--paper-card); transition: border 0.2s; }
  .stroke-input:focus { border-color: var(--red); }
  .stroke-canvas-wrap { background: var(--paper-card); border-radius: 24px; padding: 2rem; box-shadow: 0 4px 20px var(--shadow); display: flex; flex-direction: column; align-items: center; gap: 1.2rem; }
  .stroke-controls { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
  #hanzi-writer-target { border: 1.5px dashed var(--paper-warm); border-radius: 12px; }
  .stroke-word-row { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; max-width: 600px; }
  .stroke-word-chip { background: var(--paper-card); border: 1.5px solid var(--paper-warm); padding: 5px 13px; border-radius: 20px; cursor: pointer; font-family: 'Noto Serif SC', serif; font-size: 1.1rem; transition: all 0.18s; white-space: nowrap; }
  .stroke-word-chip:hover { border-color: var(--red); color: var(--red); }
  .stroke-word-chip.active { background: var(--red); color: white; border-color: var(--red); }

  /* ── MODAL ── */
  .modal-overlay { position: fixed; inset: 0; background: rgba(26,26,46,0.65); backdrop-filter: blur(4px); z-index: 200; display: none; align-items: center; justify-content: center; padding: 1rem; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--paper-card); border-radius: 24px; padding: 2rem; max-width: 440px; width: 100%; box-shadow: 0 20px 60px rgba(0,0,0,0.3); position: relative; }
  .modal-hanzi { font-family: 'Noto Serif SC', serif; font-size: 4rem; color: var(--ink); text-align: center; margin-bottom: 4px; line-height: 1.1; }
  .modal-pinyin { text-align: center; color: var(--red); font-size: 1.15rem; margin-bottom: 4px; }
  .modal-type { text-align: center; font-size: 0.75rem; color: rgba(26,26,46,0.35); margin-bottom: 8px; }
  .modal-nghia { text-align: center; font-size: 1.05rem; font-weight: 500; margin-bottom: 1rem; }
  .modal-example { background: var(--paper-warm); border-radius: 12px; padding: 1rem; font-size: 0.88rem; line-height: 1.75; color: rgba(26,26,46,0.7); }
  .modal-example .ex-hanzi { font-family: 'Noto Serif SC', serif; font-size: 1rem; color: var(--ink); font-weight: 500; }
  .modal-example .ex-pinyin { color: var(--red); font-size: 0.82rem; }
  .modal-example .ex-nghia { color: rgba(26,26,46,0.6); font-size: 0.82rem; }
  .modal-actions { display: flex; gap: 10px; margin-top: 1.2rem; justify-content: center; flex-wrap: wrap; }
  .modal-close { position: absolute; top: 14px; right: 14px; background: var(--paper-warm); border: none; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; font-size: 1rem; display: flex; align-items: center; justify-content: center; transition: background 0.2s; }
  .modal-close:hover { background: var(--paper-warm); filter: brightness(0.9); }

  /* ── TOAST ── */
  .toast { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(100px); background: var(--ink); color: var(--paper); padding: 12px 24px; border-radius: 12px; font-size: 0.9rem; z-index: 999; transition: transform 0.3s ease; pointer-events: none; white-space: nowrap; }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* ── STATS BANNER ── */
  .stats-banner { display: flex; gap: 12px; margin-bottom: 1.5rem; flex-wrap: wrap; }
  .stat-card { background: var(--paper-card); border-radius: 14px; padding: 1rem 1.4rem; box-shadow: 0 2px 10px var(--shadow); flex: 1; min-width: 120px; text-align: center; }
  .stat-num { font-family: 'Noto Serif SC', serif; font-size: 2rem; color: var(--red); font-weight: 700; line-height: 1; }
  .stat-lbl { font-size: 0.75rem; color: rgba(26,26,46,0.45); margin-top: 4px; }

  @media (max-width: 600px) {
    .tabs { padding: 0 0.5rem; }
    .tab { padding: 12px 10px; font-size: 0.78rem; }
    .fc-hanzi { font-size: 4rem; }
    .quiz-options { grid-template-columns: 1fr; }
    .word-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); }
    .stats-banner { gap: 8px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <span class="logo-hanzi">TIẾNG TRUNG MINH TÚ 明秀汉语</span>
    <span class="logo-vn">HSK 1</span>
  </div>
  <div class="header-right">
    <span class="hsk-badge">HSK 1</span>
    <span class="word-count">150 từ vựng</span>
  </div>
</header>

<nav class="tabs">
  <button class="tab active" onclick="switchTab('list', this)">📚 Từ vựng</button>
  <button class="tab" onclick="switchTab('flashcard', this)">🃏 Flashcard</button>
  <button class="tab" onclick="switchTab('quiz', this)">✏️ Trắc nghiệm</button>
  <button class="tab" onclick="switchTab('stroke', this)">🖊️ Nét chữ</button>
</nav>

<main>

  <!-- ── TỪ VỰNG ── -->
  <div id="sec-list" class="section active">
    <div class="stats-banner">
      <div class="stat-card"><div class="stat-num">150</div><div class="stat-lbl">Từ vựng HSK 1</div></div>
      <div class="stat-card"><div class="stat-num" id="stat-known">0</div><div class="stat-lbl">Đã thuộc</div></div>
      <div class="stat-card"><div class="stat-num" id="stat-streak">0</div><div class="stat-lbl">Chuỗi đúng</div></div>
      <div class="stat-card"><div class="stat-num" id="stat-quiz">0%</div><div class="stat-lbl">Điểm quiz cao nhất</div></div>
    </div>
    <div class="list-toolbar">
      <input class="search-box" id="search-input" placeholder="🔍 Tìm hán tự, pinyin, nghĩa..." oninput="renderList()">
      <div class="filter-btns">
        <button class="flt-btn active" onclick="setFilter('all',this)">Tất cả</button>
        <button class="flt-btn" onclick="setFilter('known',this)">✅ Đã nhớ</button>
        <button class="flt-btn" onclick="setFilter('unknown',this)">❓ Chưa nhớ</button>
      </div>
    </div>
    <div class="word-grid" id="word-grid"></div>
  </div>

  <!-- ── FLASHCARD ── -->
  <div id="sec-flashcard" class="section">
    <div class="fc-container">
      <div class="fc-progress">
        <span id="fc-idx-label">1 / 150</span>
        <div class="fc-progress-bar"><div class="fc-progress-fill" id="fc-prog-fill" style="width:1%"></div></div>
        <span id="fc-known-label">✅ 0</span>
      </div>

      <div class="flip-card" id="flip-card" onclick="flipCard()">
        <div class="flip-inner" id="flip-inner">
          <div class="flip-front">
            <button class="fc-audio-btn" onclick="event.stopPropagation(); speakCurrent()">🔊</button>
            <button class="fc-pinyin-show" id="fc-pinyin-toggle" onclick="event.stopPropagation(); togglePinyinHint()">拼音</button>
            <div class="fc-hanzi" id="fc-hanzi">爱</div>
            <div class="fc-front-pinyin" id="fc-front-pinyin" style="display:none"></div>
            <div class="fc-hint">Nhấn để lật thẻ · Space / Enter</div>
          </div>
          <div class="flip-back">
            <div class="fc-pinyin" id="fc-pinyin">ài</div>
            <div class="fc-nghia" id="fc-nghia">Yêu</div>
            <div class="fc-example" id="fc-example"></div>
          </div>
        </div>
      </div>

      <div class="fc-controls">
        <button class="btn-icon" onclick="fcNav(-1)" title="Trước (←)">◀</button>
        <button class="btn btn-red" onclick="markCard(false)">❌ Chưa nhớ</button>
        <button class="btn btn-green" onclick="markCard(true)">✅ Đã nhớ</button>
        <button class="btn-icon" onclick="fcNav(1)" title="Tiếp (→)">▶</button>
      </div>

      <div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center">
        <button class="btn btn-outline btn-sm" onclick="shuffleCards()">🔀 Trộn bài</button>
        <button class="btn btn-outline btn-sm" onclick="studyUnknown()">❓ Chỉ chưa nhớ</button>
        <button class="btn btn-outline btn-sm" onclick="resetProgress()">🔄 Làm lại</button>
        <button class="btn btn-gold btn-sm" onclick="speakCurrent()">🔊 Phát âm</button>
      </div>
    </div>
  </div>

  <!-- ── TRẮC NGHIỆM ── -->
  <div id="sec-quiz" class="section">
    <div class="quiz-header">
      <div class="quiz-type-bar">
        <button class="qtype-btn active" onclick="setQType('hanzi2nghia',this)">字 → Nghĩa</button>
        <button class="qtype-btn" onclick="setQType('nghia2hanzi',this)">Nghĩa → 字</button>
        <button class="qtype-btn" onclick="setQType('pinyin2hanzi',this)">Pinyin → 字</button>
        <button class="qtype-btn" onclick="setQType('hanzi2pinyin',this)">字 → Pinyin</button>
      </div>
      <div class="quiz-score-badge">⭐ <span id="quiz-score">0</span> / <span id="quiz-total">10</span></div>
    </div>

    <div id="quiz-area">
      <div class="quiz-question">
        <div class="quiz-q-label" id="quiz-q-label">Chọn nghĩa đúng</div>
        <div class="quiz-q-hanzi" id="quiz-q-main" style="font-family:'Noto Serif SC',serif">?</div>
        <div class="quiz-q-sub" id="quiz-q-sub"></div>
      </div>
      <div class="quiz-options" id="quiz-options"></div>
      <div class="quiz-feedback" id="quiz-feedback"></div>
      <div style="text-align:center">
        <button class="btn btn-gold" id="quiz-next-btn" onclick="nextQuestion()" style="display:none">Câu tiếp ▶</button>
      </div>
    </div>

    <div id="quiz-result-area" style="display:none">
      <div class="quiz-result">
        <div class="quiz-result-score" id="result-score">0/10</div>
        <div class="quiz-result-label" id="result-label"></div>
        <div class="quiz-result-detail" id="result-detail"></div>
        <div style="display:flex;gap:10px;justify-content:center;margin-top:1.5rem;flex-wrap:wrap">
          <button class="btn btn-red" onclick="startQuiz()">🔄 Làm lại</button>

// ══════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════
let fcIndex = 0;
let fcOrder = vocab.map((_,i) => i);
let fcKnown = new Set(JSON.parse(localStorage.getItem('hsk1_known') || '[]'));
let showPinyinHint = false;
let currentFilter = 'all';
let currentModalIdx = -1;
let quizType = 'hanzi2nghia';
let quizScore = 0;
let quizAsked = 0;
let quizTotal = 10;
let quizQueue = [];
let quizAnswered = false;
let bestScore = parseInt(localStorage.getItem('hsk1_best') || '0');
let streak = parseInt(localStorage.getItem('hsk1_streak') || '0');
let hw = null;
let currentHwChar = '';

function saveState() {
  localStorage.setItem('hsk1_known', JSON.stringify([...fcKnown]));
  localStorage.setItem('hsk1_best', bestScore);
  localStorage.setItem('hsk1_streak', streak);
}

// ══════════════════════════════════════════
//  TABS
// ══════════════════════════════════════════
function switchTab(name, el) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('sec-' + name).classList.add('active');
  el.classList.add('active');
  if (name === 'quiz') startQuiz();
  if (name === 'stroke') renderStrokeChips();
}

// ══════════════════════════════════════════
//  WORD LIST
// ══════════════════════════════════════════
function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.flt-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderList();
}

function renderList() {
  const grid = document.getElementById('word-grid');
  const q = document.getElementById('search-input').value.toLowerCase();

  let filtered = vocab.filter((w, i) => {
    const matchSearch = !q || w.hanzi.includes(q) || (w.pinyin||'').toLowerCase().includes(q) || (w.nghia||'').toLowerCase().includes(q);
    const matchFilter = currentFilter === 'all' ||
      (currentFilter === 'known' && fcKnown.has(i)) ||
      (currentFilter === 'unknown' && !fcKnown.has(i));
    return matchSearch && matchFilter;
  });

  updateStats();

  if (!filtered.length) {
    grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:3rem;color:rgba(26,26,46,0.4)">
      <div style="font-size:2rem;margin-bottom:0.8rem">🔍</div>
      <div>Không tìm thấy kết quả</div></div>`;
    return;
  }

  grid.innerHTML = filtered.map(w => {
    const i = vocab.indexOf(w);
    const known = fcKnown.has(i);
    return `<div class="word-card" onclick="openModal(${i})" style="${known ? 'border-color:rgba(39,174,96,0.3);background:#f5fbf7' : ''}">
      ${known ? '<div class="wc-type" style="color:var(--green)">✅</div>' : ''}
      <div class="wc-hanzi">${w.hanzi}</div>
      <div class="wc-pinyin">${w.pinyin||''}</div>
      <div class="wc-nghia">${w.nghia}</div>
    </div>`;
  }).join('');
}

function updateStats() {
  document.getElementById('stat-known').textContent = fcKnown.size;
  document.getElementById('stat-streak').textContent = streak;
  document.getElementById('stat-quiz').textContent = bestScore + '%';
}

// ══════════════════════════════════════════
//  MODAL
// ══════════════════════════════════════════
function openModal(idx) {
  const w = vocab[idx];
  currentModalIdx = idx;
  document.getElementById('modal-hanzi').textContent = w.hanzi;
  document.getElementById('modal-pinyin').textContent = w.pinyin || '';
  document.getElementById('modal-type').textContent = '';
  document.getElementById('modal-nghia').textContent = w.nghia;
  const exEl = document.getElementById('modal-example');
  if (w.vi_du_hanzi) {
    exEl.style.display = '';
    document.getElementById('modal-ex-hanzi').textContent = w.vi_du_hanzi;
    document.getElementById('modal-ex-pinyin').textContent = w.vi_du_pinyin || '';
    document.getElementById('modal-ex-nghia').textContent = w.vi_du_nghia || '';
  } else { exEl.style.display = 'none'; }
  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal(e) {
  if (!e || e.target === document.getElementById('modal-overlay'))
    document.getElementById('modal-overlay').classList.remove('open');
}

function speakModal() {
  if (currentModalIdx >= 0) speak(vocab[currentModalIdx].hanzi);
}

function toggleKnownModal() {
  if (currentModalIdx < 0) return;
  if (fcKnown.has(currentModalIdx)) {
    fcKnown.delete(currentModalIdx);
    showToast('❌ Đã bỏ đánh dấu');
  } else {
    fcKnown.add(currentModalIdx);
    showToast('✅ Đã đánh dấu là nhớ');
  }
  saveState();
  renderList();
}

function openStrokeForModal() {
  if (currentModalIdx < 0) return;
  const char = vocab[currentModalIdx].hanzi[0];
  closeModal();
  document.getElementById('stroke-input').value = char;
  loadHanziChar(char, true);
  document.querySelectorAll('.tab')[3].click();
}

// ══════════════════════════════════════════
//  FLASHCARD
// ══════════════════════════════════════════
function updateFlashcard() {
  if (!fcOrder.length) return;
  const w = vocab[fcOrder[fcIndex]];
  document.getElementById('fc-hanzi').textContent = w.hanzi;
  document.getElementById('fc-pinyin').textContent = w.pinyin || '';
  document.getElementById('fc-nghia').textContent = w.nghia;
  document.getElementById('fc-front-pinyin').textContent = w.pinyin || '';
  document.getElementById('fc-front-pinyin').style.display = showPinyinHint ? '' : 'none';
  const exEl = document.getElementById('fc-example');
  if (w.vi_du_hanzi) {
    exEl.innerHTML = `<strong>${w.vi_du_hanzi}</strong><br><small style="color:var(--red)">${w.vi_du_pinyin||''}</small><br><small>${w.vi_du_nghia||''}</small>`;
    exEl.style.display = '';
  } else { exEl.style.display = 'none'; }
  document.getElementById('flip-card').classList.remove('flipped');
  const total = fcOrder.length;
  document.getElementById('fc-idx-label').textContent = `${fcIndex+1} / ${total}`;
  document.getElementById('fc-known-label').textContent = `✅ ${fcKnown.size}`;
  document.getElementById('fc-prog-fill').style.width = ((fcIndex+1)/total*100) + '%';
}

function flipCard() {
  document.getElementById('flip-card').classList.toggle('flipped');
}

function togglePinyinHint() {
  showPinyinHint = !showPinyinHint;
  const btn = document.getElementById('fc-pinyin-toggle');
  btn.style.background = showPinyinHint ? 'rgba(247,244,239,0.3)' : 'rgba(247,244,239,0.1)';
  document.getElementById('fc-front-pinyin').style.display = showPinyinHint ? '' : 'none';
}

function fcNav(dir) {
  fcIndex = (fcIndex + dir + fcOrder.length) % fcOrder.length;
  updateFlashcard();
}

function markCard(known) {
  const key = fcOrder[fcIndex];
  if (known) {
    fcKnown.add(key);
    streak++;
  } else {
    fcKnown.delete(key);
    streak = 0;
  }
  saveState();
  updateStats();
  if (fcIndex < fcOrder.length - 1) { fcIndex++; updateFlashcard(); }
  else {
    showToast(`🎉 Xong vòng! Đã nhớ ${fcKnown.size}/150 từ`);
    updateFlashcard();
  }
}

function shuffleCards() {
  for (let i = fcOrder.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [fcOrder[i], fcOrder[j]] = [fcOrder[j], fcOrder[i]];
  }
  fcIndex = 0; updateFlashcard();
  showToast('🔀 Đã trộn bài');
}

function studyUnknown() {
  const unknown = vocab.map((_,i) => i).filter(i => !fcKnown.has(i));
  if (!unknown.length) { showToast('🎉 Bạn đã nhớ tất cả!'); return; }
  fcOrder = unknown.sort(() => Math.random()-0.5);
  fcIndex = 0; updateFlashcard();
  showToast(`📖 Ôn ${unknown.length} từ chưa nhớ`);
}

function resetProgress() {
  fcKnown.clear(); fcIndex = 0; streak = 0;
  fcOrder = vocab.map((_,i) => i);
  saveState();
  updateFlashcard();
  renderList();
  showToast('🔄 Đã làm lại từ đầu');
}

function speakCurrent() {
  if (!fcOrder.length) return;
  speak(vocab[fcOrder[fcIndex]].hanzi);
}

// ══════════════════════════════════════════
//  QUIZ
// ══════════════════════════════════════════
function setQType(type, btn) {
  quizType = type;
  document.querySelectorAll('.qtype-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  startQuiz();
}

function startQuiz() {
  quizScore = 0; quizAsked = 0;
  quizTotal = Math.min(15, vocab.length);
  quizQueue = [...vocab].sort(() => Math.random()-0.5).slice(0, quizTotal);
  document.getElementById('quiz-score').textContent = 0;
  document.getElementById('quiz-total').textContent = quizTotal;
  document.getElementById('quiz-area').style.display = '';
  document.getElementById('quiz-result-area').style.display = 'none';
  nextQuestion();
}

function nextQuestion() {
  if (quizAsked >= quizTotal) { showResult(); return; }
  quizAnswered = false;
  document.getElementById('quiz-next-btn').style.display = 'none';
  document.getElementById('quiz-feedback').textContent = '';
  document.getElementById('quiz-q-sub').textContent = '';

  const word = quizQueue[quizAsked];
  let qDisplay, qStyle, qSub, correctAns, getOpt;

  if (quizType === 'hanzi2nghia') {
    qDisplay = word.hanzi; qStyle = "font-family:'Noto Serif SC',serif;font-size:4rem";
    qSub = word.pinyin;
    document.getElementById('quiz-q-label').textContent = 'Chọn nghĩa đúng của từ';
    correctAns = word.nghia;
    getOpt = w => w.nghia;
  } else if (quizType === 'nghia2hanzi') {
    qDisplay = word.nghia; qStyle = "font-family:Inter,sans-serif;font-size:1.4rem";
    document.getElementById('quiz-q-label').textContent = 'Chọn chữ Hán đúng';
    correctAns = word.hanzi;
    getOpt = w => `<span style="font-family:'Noto Serif SC',serif;font-size:1.6rem">${w.hanzi}</span>`;
  } else if (quizType === 'pinyin2hanzi') {
    qDisplay = word.pinyin; qStyle = "font-family:Inter,sans-serif;font-size:1.8rem;color:var(--red)";
    document.getElementById('quiz-q-label').textContent = 'Chọn chữ Hán đúng';
    correctAns = word.hanzi;
    getOpt = w => `<span style="font-family:'Noto Serif SC',serif;font-size:1.6rem">${w.hanzi}</span>`;
  } else { // hanzi2pinyin
    qDisplay = word.hanzi; qStyle = "font-family:'Noto Serif SC',serif;font-size:4rem";
    document.getElementById('quiz-q-label').textContent = 'Chọn pinyin đúng';
    correctAns = word.pinyin;
    getOpt = w => w.pinyin;
  }

  const qMain = document.getElementById('quiz-q-main');
  qMain.innerHTML = qDisplay;
  qMain.style.cssText = qStyle;
  if (qSub) document.getElementById('quiz-q-sub').textContent = qSub;

  const others = vocab.filter(v => (quizType === 'hanzi2nghia' ? v.nghia : quizType === 'hanzi2pinyin' ? v.pinyin : v.hanzi) !== correctAns);
  const wrongs = others.sort(() => Math.random()-0.5).slice(0,3);
  const options = [...wrongs.map(w => ({w, ans: correctAns === word.nghia ? w.nghia : correctAns === word.hanzi ? w.hanzi : w.pinyin})), {w: word, ans: correctAns}].sort(() => Math.random()-0.5);

  const container = document.getElementById('quiz-options');
  container.innerHTML = options.map(o => {
    const display = quizType === 'nghia2hanzi' || quizType === 'pinyin2hanzi'
      ? `<span style="font-family:'Noto Serif SC',serif;font-size:1.6rem">${o.ans}</span>`
      : o.ans;
    return `<button class="quiz-opt" onclick="checkAnswer(this,'${esc(o.ans)}','${esc(correctAns)}')">${display}</button>`;
  }).join('');
}

function esc(s){ return (s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }

function checkAnswer(btn, chosen, correct) {
  if (quizAnswered) return;
  quizAnswered = true; quizAsked++;
  document.querySelectorAll('.quiz-opt').forEach(b => {
    b.disabled = true;
    const txt = b.textContent.trim();
    if (b === btn) b.classList.add(chosen === correct ? 'correct' : 'wrong');
    if (txt === correct && chosen !== correct) b.classList.add('correct');
  });
  if (chosen === correct) {
    quizScore++;
    document.getElementById('quiz-feedback').innerHTML = '<span style="color:var(--green)">✅ Chính xác!</span>';
    speak(quizQueue[quizAsked-1].hanzi);
  } else {
    document.getElementById('quiz-feedback').innerHTML = `<span style="color:var(--red)">❌ Đáp án: <strong>${correct}</strong></span>`;
  }
  document.getElementById('quiz-score').textContent = quizScore;
  document.getElementById('quiz-next-btn').style.display = '';
}

function showResult() {
  document.getElementById('quiz-area').style.display = 'none';
  document.getElementById('quiz-result-area').style.display = '';
  const pct = Math.round(quizScore/quizTotal*100);
  if (pct > bestScore) { bestScore = pct; saveState(); }
  document.getElementById('result-score').textContent = `${quizScore}/${quizTotal}`;
  const labels = [[90,'🎉 Xuất sắc!'],[70,'👍 Khá tốt!'],[50,'📖 Cần ôn thêm'],[0,'💪 Cố lên nào!']];
  const label = labels.find(([t]) => pct >= t)[1];
  document.getElementById('result-label').textContent = `${pct}% — ${label}`;
  document.getElementById('result-detail').textContent = bestScore > pct ? `Kỷ lục: ${bestScore}%` : `🏆 Kỷ lục mới: ${bestScore}%!`;
  updateStats();
}

// ══════════════════════════════════════════
//  STROKE ORDER
// ══════════════════════════════════════════
function renderStrokeChips() {
  const container = document.getElementById('stroke-word-chips');
  container.innerHTML = vocab.map((w,i) =>
    `<span class="stroke-word-chip" onclick="selectStrokeChip(this,'${esc(w.hanzi)}',${i})">${w.hanzi}</span>`
  ).join('');
}

function selectStrokeChip(el, hanzi, idx) {
  document.querySelectorAll('.stroke-word-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  el.scrollIntoView({behavior:'smooth', block:'nearest', inline:'center'});
  document.getElementById('stroke-input').value = hanzi[0];
  loadHanziChar(hanzi[0], true);
  // show detail
  const w = vocab[idx];
  document.getElementById('stroke-word-detail').style.display = '';
  document.getElementById('sw-pinyin').textContent = w.pinyin || '';
  document.getElementById('sw-nghia').textContent = '— ' + w.nghia;
}

function loadHanziChar(char, force=false) {
  char = (char || '').trim();
  if (!char) return;
  if (!force && char === currentHwChar) return;
  // Validate CJK Unicode block
  if (!/[\u4e00-\u9fff\u3400-\u4dbf]/.test(char)) {
    document.getElementById('stroke-info').textContent = 'Vui lòng nhập ký tự Hán tự hợp lệ';
    return;
  }
  currentHwChar = char;
  document.getElementById('stroke-info').textContent = 'Đang tải dữ liệu nét...';

  // Destroy previous instance cleanly
  if (hw) {
    try { hw.cancelQuiz(); } catch(e) {}
    hw = null;
  }

  // Clear container and recreate SVG target to avoid DOM conflicts
  const container = document.getElementById('hanzi-writer-target');
  container.innerHTML = '';

  // charDataLoader: fetch trực tiếp từ CDN chính thức của HanziWriter
  // Đây là fix chính cho GitHub Pages — tránh dùng default loader bị chặn CORS
  const CDN_BASE = 'https://cdn.jsdelivr.net/npm/hanzi-writer-data@2.0';
  function charDataLoader(character, onLoad, onError) {
    const codePoint = character.codePointAt(0).toString(16).toUpperCase().padStart(5, '0');
    const url = CDN_BASE + '/' + character + '.json';
    fetch(url)
      .then(function(res) {
        if (!res.ok) throw new Error('HTTP ' + res.status);
        return res.json();
      })
      .then(function(data) { onLoad(data); })
      .catch(function(err) {
        // Fallback: thử với codepoint filename
        const url2 = CDN_BASE + '/' + codePoint + '.json';
        fetch(url2)
          .then(function(r) { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
          .then(function(data) { onLoad(data); })
          .catch(function() { onError(err); });
      });
  }

  try {
    hw = HanziWriter.create(container, char, {
      width: 280,
      height: 280,
      padding: 20,
      showOutline: true,
      strokeColor: '#1a1a2e',
      outlineColor: '#d0cbbe',
      radicalColor: '#c0392b',
      drawingColor: '#c0392b',
      drawingWidth: 5,
      strokeAnimationSpeed: 1,
      delayBetweenStrokes: 250,
      charDataLoader: charDataLoader,
      onLoadCharDataSuccess: function() {
        document.getElementById('stroke-info').textContent = '「' + char + '」— Nhấn "Hoạt hình nét" để xem';
      },
      onLoadCharDataError: function(reason) {
        document.getElementById('stroke-info').textContent = '⚠️ Không tìm thấy dữ liệu nét cho「' + char + '」';
        console.warn('HanziWriter load error:', reason);
      }
    });
  } catch(e) {
    document.getElementById('stroke-info').textContent = 'Lỗi khởi tạo: ' + e.message;
    console.error('HanziWriter init error:', e);
  }
}

function hwAnimate() { hw ? hw.animateCharacter() : showToast('Nhập ký tự trước'); }
function hwShowChar() { hw ? hw.showCharacter() : showToast('Nhập ký tự trước'); }
function hwHideChar() { hw ? hw.hideCharacter() : showToast('Nhập ký tự trước'); }
function hwQuiz() {
  if (!hw) { showToast('Nhập ký tự trước'); return; }
  hw.quiz({
    onMistake: (strokeData) => {},
    onCorrectStroke: () => {},
    onComplete: (summary) => {
      showToast(`✅ Hoàn thành! Sai ${summary.totalMistakes} lần`);
    }
  });
  showToast('✏️ Hãy vẽ nét theo thứ tự đúng');
}
function speakChar() {
  const c = document.getElementById('stroke-input').value.trim();
  if (c) speak(c); else showToast('Nhập ký tự trước');
}

// ══════════════════════════════════════════
//  AUDIO
// ══════════════════════════════════════════
function speak(text) {
  if (!('speechSynthesis' in window)) { showToast('Trình duyệt không hỗ trợ TTS'); return; }
  window.speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = 'zh-CN';
  utter.rate = 0.85;
  utter.pitch = 1.05;
  const voices = window.speechSynthesis.getVoices();
  const zhVoice = voices.find(v => v.lang && v.lang.startsWith('zh'));
  if (zhVoice) utter.voice = zhVoice;
  window.speechSynthesis.speak(utter);
}
if (window.speechSynthesis) window.speechSynthesis.onvoiceschanged = () => {};

// ══════════════════════════════════════════
//  TOAST
// ══════════════════════════════════════════
let toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2800);
}

// ══════════════════════════════════════════
//  KEYBOARD
// ══════════════════════════════════════════
document.addEventListener('keydown', e => {
  const sec = document.querySelector('.section.active');
  if (!sec) return;
  if (document.getElementById('modal-overlay').classList.contains('open')) {
    if (e.key === 'Escape') closeModal();
    return;
  }
  if (sec.id === 'sec-flashcard') {
    if (e.key === 'ArrowLeft') fcNav(-1);
    else if (e.key === 'ArrowRight' || e.key === 'n') fcNav(1);
    else if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); flipCard(); }
    else if (e.key === 'y' || e.key === '1') markCard(true);
    else if (e.key === 'x' || e.key === '2') markCard(false);
    else if (e.key === 'p') speakCurrent();
  }
  if (sec.id === 'sec-quiz' && quizAnswered && (e.key === 'Enter' || e.key === ' ')) {
    e.preventDefault(); nextQuestion();
  }
});

// ══════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════
renderList();
updateFlashcard();
startQuiz();
renderStrokeChips();
</script>
